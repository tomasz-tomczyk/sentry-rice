name: Publish to PyPI

# Push a version tag (e.g. v0.1.0) to build and publish to PyPI via Trusted
# Publishing (OIDC) — no API tokens or secrets stored in the repo.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        # Pinned to v1.12.4 exact tag; upgrade to a SHA pin when the SHA is verifiable.
        uses: pypa/gh-action-pypi-publish@v1.12.4
